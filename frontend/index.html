<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRPG World Status</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260609-3" />
  </head>
  <body>
    <div id="snowfield" class="snowfield" aria-hidden="true"></div>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">AllenNLP + DeepSeek · 三层叙事本体</p>
            <h1>TRPG World Status</h1>
            <p class="subtitle">
              输入英文叙事文本，先进行共指消解，再生成兼顾文学阐释与 TRPG 改编的本体化世界状态。
              首次加载 SpanBERT 可能需要数分钟，请保持页面打开。
            </p>
          </div>
          <div id="health" class="status">检查服务中</div>
        </header>

        <section class="ontology-strip" aria-label="按本体层次筛选世界状态">
          <button class="ontology-level ontology-tab" type="button" data-world-view="micro">
            <span>微观层</span>
            <strong>人物与线索</strong>
            <p>Character · NarrativeObject / Clue · hasOwner · evokesMemory</p>
          </button>
          <button class="ontology-level ontology-tab" type="button" data-world-view="meso">
            <span>中观层</span>
            <strong>关系、群体与空间</strong>
            <p>CollectiveAgent · Place · hasSocialRelationWith · belongsToCollective</p>
          </button>
          <button class="ontology-level ontology-tab" type="button" data-world-view="macro">
            <span>宏观层</span>
            <strong>事件、任务与演化</strong>
            <p>NarrativeEvent · Quest · OpenThread · precedes · containsQuest</p>
          </button>
          <button class="ontology-context ontology-tab" type="button" data-world-view="context">
            <span>全局语境变量</span>
            <strong>atmosphere · scene_state</strong>
            <p>作为场景基调和当前整体条件，不作为独立概念类。</p>
          </button>
        </section>

        <section class="storage-panel">
          <div>
            <p id="saveStatus" class="save-status">尚无已保存快照。</p>
            <p class="storage-help">
              快照只保存在当前浏览器，读取快照不会再次调用 DeepSeek。
            </p>
            <p id="storageNotice" class="notice" hidden></p>
          </div>

          <div class="storage-actions">
            <button id="saveButton" type="button" disabled>保存快照</button>
            <button id="loadButton" type="button" disabled>载入上次结果</button>
            <button id="clearButton" type="button" disabled>清空</button>
            <button id="downloadJsonButton" type="button" disabled>下载 JSON</button>
            <button id="downloadTxtButton" type="button" disabled>下载共指文本</button>
          </div>
        </section>

        <div class="editor-grid">
          <section class="panel input-panel">
            <div class="panel-head">
              <h2>原文本</h2>
              <label class="file-button">
                <input id="fileInput" type="file" accept=".txt,text/plain,.md,text/markdown" />
                读取文本
              </label>
            </div>
            <textarea
              id="sourceText"
              spellcheck="false"
              placeholder="粘贴 The Dead 或其他英文叙事文本..."
            ></textarea>
            <div class="controls">
              <label>
                共指分块
                <input id="maxChars" type="number" min="300" max="3000" step="100" value="1200" />
              </label>
              <button id="runButton" type="button">生成本体化世界状态</button>
            </div>
          </section>

          <section class="panel output-panel">
            <div class="panel-head">
              <div>
                <h2>本体化世界状态 JSON</h2>
                <p id="worldViewDescription" class="panel-note">当前显示：完整 JSON</p>
              </div>
              <div class="output-actions">
                <button id="fullJsonButton" class="view-button active" type="button" data-world-view="full">
                  完整 JSON
                </button>
                <button id="copyButton" type="button" disabled>复制当前视图</button>
              </div>
            </div>
            <pre id="output">{}</pre>
          </section>
        </div>

        <section class="panel resolved-panel">
          <div class="panel-head">
            <h2>共指消解结果</h2>
            <span id="meta"></span>
          </div>
          <pre id="resolvedOutput">等待生成</pre>
        </section>
      </section>
    </main>

    <script src="/static/app.js?v=20260609-4"></script>
  </body>
</html>
